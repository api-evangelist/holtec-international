aid: holtec-international
name: Holtec International
description: >-
  Holtec International is a privately held American supplier of equipment and
  systems for the nuclear, solar, geothermal, and fossil power-generation
  industries. The company is best known for its spent-fuel storage and transport
  casks (HI-STAR, HI-STORM, HI-STORE CISF), decommissioning services through
  Holtec Decommissioning International (HDI), and its in-development SMR-300
  small modular reactor — a roughly 320 MWe two-loop pressurized water reactor
  with an 80-year design life. Holtec is currently pursuing the first-ever
  restart of a permanently shut-down U.S. commercial nuclear power plant at
  Palisades in Michigan, which is also designated as the first deployment site
  for the SMR-300. The company runs manufacturing facilities in Camden, NJ,
  Pittsburgh, PA, and Orrville, OH, and partners with Hyundai Engineering &
  Construction (HDEC) on SMR-300 detailed design and full-scope plant
  construction.
